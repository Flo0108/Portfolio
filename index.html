<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Image Project Sphere</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">

  
  <style>
    body { margin: 0; overflow: hidden; }
    .tooltip {
      position: absolute;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 5px 10px;
      border-radius: 4px;
      pointer-events: none;
      display: none;
    }


  </style>
</head>
<body>

  <header class="header">
    <h1 class="site-title">Florian Zeif</h1>
    <p class="subtitle">architecture × computation</p>
  </header>


  <div id="three-container" style="position: relative; width: 100vw; height: 100vh;">
    <canvas id="grid-canvas"></canvas>
    <canvas id="three-canvas"></canvas>

      <div id="sprite-label" style="
        position: absolute;
        pointer-events: none;
        background: rgba(0, 0, 0, 0.8);
        padding: 4px 6px;
        border-radius: 4px;
        font-family: sans-serif;
        font-size: 40px;
      "></div>
    <canvas id="overlay-canvas" style="position: absolute; top: 0; left: 0; pointer-events: none;"></canvas>

  </div>
  <div id="project-display" class="project-display"></div>





<div class="tooltip" id="tooltip"></div>
<script src="https://cdn.jsdelivr.net/npm/three@0.120.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.120.0/examples/js/controls/OrbitControls.js"></script>
<script src="script.js"></script>
</body>
</html>
